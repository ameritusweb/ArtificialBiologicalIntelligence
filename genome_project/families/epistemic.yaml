# Epistemic Family
# Receptors that detect the organism's own epistemic states as objects of processing

family_metadata:
  name: Epistemic
  description: |
    Receptors that fire when the organism's own relationship to a thought
    becomes motivationally significant. Not the thought itself, not
    its certainty value, but the organism's detection of what kind of
    epistemic state it is in: believing, doubting, or entertaining a
    counterfactual possibility.

    The critical distinction: the mental model already tracks certainty
    as a value. These receptors fire when that value, or the mismatch
    between that value and prediction performance, becomes an object
    the organism can reason about. Certainty-as-value is infrastructure.
    Certainty-as-detected-state is a receptor.

    This family emerged from the T57 annealing result: releasing
    certainty on conflict entries produced more resolutions than
    protecting it. But the organism in that experiment had no receptor
    for the state it was in during annealing — no way to detect
    "I am currently doubting" and treat that as motivationally
    significant. These receptors close that gap.

  evolutionary_thesis: |
    Epistemic receptors emerge when the organism's own confidence
    state has survival consequences that differ from the consequences
    of the thought content itself. An organism that can detect "I
    believe this strongly but it keeps generating surprises" can
    choose to explore alternatives. An organism that cannot detect
    its own doubt state can only endure uncertainty or resolve it
    prematurely.

    The selection pressure: environments where premature commitment
    is fatal and sustained doubt is adaptive — where the organism
    must hold open possibilities long enough for the right one to
    emerge, and where detecting the difference between productive
    and unproductive doubt determines whether attention stays
    allocated.

  trunk_receptor: belief_detection
  canopy_receptors: [counterfactual_salience, fundamental_distinction, topology_awareness, epistemic_strategy]

---

receptors:
  - receptor_id: belief_detection
    name: Own-Belief State Detection
    family: epistemic
    tier: trunk

    dependencies:
      - receptor_id: metacognition
        note: "Must model own processing before detecting belief as a state"
      - receptor_id: causal_inference
        note: "Must understand prediction-outcome relationships"

    environmental_trigger:
      structure: |
        The organism detects that a currently active thought has high
        certainty that is well-calibrated — predictions it generates
        keep confirming. Not just high certainty (which could be
        unjustified), but certainty that has been earned through
        repeated prediction success in the experience log.
      survival_benefit: |
        Belief-as-detected-state enables the organism to reason about
        what it believes, compare beliefs, detect belief conflict,
        and choose to act on beliefs with appropriate confidence.
        Without this receptor, belief is implicit weighting; with it,
        belief becomes an object of thought — the prerequisite for
        the epistemic canopy.
      metabolic_cost: low
      selection_pressure: |
        Environments where distinguishing justified from unjustified
        confidence matters — where acting on unjustified confidence
        is costly and detecting the difference is adaptive.

    selection_environments:
      - variable_reliability_environments
      - environments_requiring_calibrated_confidence
      - multi_source_information_environments

    unlocks:
      - doubt_detection
      - belief_comparison
      - epistemic_self_awareness

    emergence_signature:
      description: |
        The organism allocates different resources to high-certainty
        well-calibrated thoughts versus high-certainty poorly-calibrated
        thoughts. Behavioral marker: treats confident predictions that
        keep confirming differently from confident predictions that
        keep surprising — not in the content of the response, but in
        the metabolic/attentional investment.
      metrics:
        - metric_name: calibration_sensitivity
          measurement_method: |
            Compare organism behavior on high-certainty + low-error
            contexts versus high-certainty + high-error contexts.
            Belief detection = differential response to calibration,
            not just to certainty level.
          expected_range: ">0.2 behavioral difference"
          detection_threshold: 0.2

    predicted_emergence_order:
      generation_range: "80-150"
      confidence: medium

    notes: |
      The mental model already computes certainty and prediction
      error separately. The receptor fires on their combination:
      high certainty + low error = belief. High certainty + high
      error = doubt (see doubt_detection). The receptor makes the
      implicit distinction explicit and actionable.

  - receptor_id: doubt_detection
    name: Commitment-Performance Mismatch Detection
    family: epistemic
    tier: branch

    dependencies:
      - receptor_id: belief_detection
        note: "Must detect belief before detecting its failure mode"
      - receptor_id: conflict_detection
        note: "Must detect competing demands"

    environmental_trigger:
      structure: |
        The organism detects that a currently active thought has
        high certainty that is poorly calibrated — the organism
        believes something strongly but it keeps generating prediction
        errors. This is distinct from low certainty (which might mean
        insufficient experience) and from surprise (which is a single
        event). Doubt is specifically: sustained high commitment with
        sustained poor performance.
      survival_benefit: |
        Doubt-as-detected-state enables the annealing mechanism to
        become conscious rather than mechanical. The T57 result showed
        certainty release producing more resolutions — but without a
        doubt receptor, the organism cannot detect "I am in a state
        that would benefit from releasing commitment" and must rely
        on external certainty decay. With the receptor, the organism
        can choose to anneal — to deliberately lower its confidence
        on a stuck prediction — which is the difference between
        experiencing doubt and acting on it.
      metabolic_cost: medium
      selection_pressure: |
        Environments where sustained confident wrongness is costly
        and detecting the mismatch enables corrective exploration.
        The selection pressure is the same one that produced the T57
        result: releasing certainty helps, and detecting when to
        release it helps more.

    selection_environments:
      - environments_with_sustained_misleading_signals
      - environments_where_confident_wrongness_is_costly
      - environments_requiring_belief_revision

    unlocks:
      - deliberate_annealing
      - belief_revision
      - epistemic_humility

    emergence_signature:
      description: |
        The organism detects high-commitment + poor-performance states
        and reduces its certainty deliberately, rather than waiting for
        the natural certainty decay from update_certainty. Behavioral
        marker: after detecting doubt, the organism explores alternatives
        more quickly than organisms without the receptor.
      metrics:
        - metric_name: doubt_triggered_exploration
          measurement_method: |
            After a period of high certainty + high prediction error
            (>10 consecutive steps), measure how quickly the organism
            shifts to exploratory behavior. Doubt detection = faster
            shift than organisms relying on natural certainty decay.
          expected_range: ">30% faster exploration onset"
          detection_threshold: 0.3
        - metric_name: annealing_rate
          measurement_method: |
            Compare certainty decay rate on conflict entries between
            organisms with and without doubt detection. Organisms with
            doubt should show faster, more targeted certainty reduction
            on specifically poorly-performing entries.
          expected_range: ">20% faster targeted certainty reduction"
          detection_threshold: 0.2

    predicted_emergence_order:
      generation_range: "120-200"
      confidence: medium

    notes: |
      This receptor is the conscious version of the T57 annealing
      mechanism. T57 showed that mechanical certainty reduction helps.
      The doubt receptor detects when mechanical reduction should
      happen, making it targeted rather than uniform. An organism
      with doubt detection anneals on the right entries; an organism
      without it anneals everywhere or nowhere.

      The connection to the anxiety derivation (T21): anxiety is a
      correctly-functioning amplification loop. Doubt is a correctly-
      functioning detection of when commitment should be released.
      Both are meta-receptors that read the system's own processing
      state, and both become pathological when they can't self-regulate
      — chronic doubt is the epistemic analog of chronic anxiety.

  - receptor_id: counterfactual_salience
    name: Motivationally-Loaded Possibility Detection
    family: epistemic
    tier: canopy

    dependencies:
      - receptor_id: doubt_detection
        note: "Must detect doubt before non-actual possibilities become salient"
      - receptor_id: counterfactual_reasoning
        note: "Must simulate counterfactuals before detecting their salience"
      - receptor_id: optimism
        note: "Must project positive future states"

    environmental_trigger:
      structure: |
        The organism detects that a non-actual state S has become
        motivationally loaded — the organism is not just simulating
        what could happen, but caring about a possibility. The
        firing condition: S is not currently true, S is causally
        reachable from some variation of the current situation, and
        the organism is evaluating S against its pain/endorphin model.

        This is the moment "this could happen" becomes "this matters."
        It's distinct from prediction (forward projection from present
        state), memory (retrieval of actual states), and planning
        (action selection toward a goal). Counterfactual salience is
        the detection that a branch point in possibility space has
        become worth attending to.
      survival_benefit: |
        Counterfactual salience enables sustained investigation of
        possibilities that are not yet confirmed. Einstein holding
        the Maxwell/Newton tension was sustained counterfactual
        processing: "what would be true if light speed were invariant"
        held as an active motivationally-loaded possibility before
        evidence confirmed it. Without the receptor, possibilities
        are either acted on immediately or discarded. With it,
        possibilities can be held open, explored, and evaluated
        against the organism's full model of consequences.
      metabolic_cost: high
      selection_pressure: |
        Environments where important outcomes depend on possibilities
        that require sustained investigation before commitment —
        where premature commitment to the first plausible option is
        costly and sustained exploration of the possibility space
        is adaptive.

    selection_environments:
      - multi_strategy_environments
      - environments_with_delayed_confirmation
      - environments_requiring_innovation

    unlocks:
      - sustained_investigation
      - possibility_space_navigation
      - epistemic_strategy

    emergence_signature:
      description: |
        The organism holds non-actual possibilities open and allocates
        attention to them based on their predicted consequences, not
        just on their certainty or novelty. Behavioral marker: the
        organism returns to investigate a possibility that was not
        immediately rewarding, driven by the predicted consequences
        of that possibility being true.
      metrics:
        - metric_name: counterfactual_revisitation
          measurement_method: |
            Track contexts where the organism considered a non-actual
            possibility and returned to investigate it later, despite
            no immediate reward signal. Counterfactual salience =
            revisitation rate for high-predicted-consequence
            possibilities exceeds revisitation for low-predicted-
            consequence ones.
          expected_range: ">2x revisitation rate for high vs low consequence"
          detection_threshold: 2.0

    predicted_emergence_order:
      generation_range: "200-350"
      confidence: low

    notes: |
      This receptor connects directly to the conflict tolerance
      result and the annealing discovery. Releasing certainty
      (T57) opens a counterfactual space — "maybe the other horn
      is right." Without a receptor that fires on that open
      possibility, the organism has no way to treat the
      counterfactual as worth exploring rather than just as
      uncertainty to be reduced.

      The receptor also connects to the serialization thesis:
      a counterfactual that becomes salient is a prediction about
      a non-actual state — which is a prediction surface that
      simultaneous processing of the actual state alone cannot
      generate. Counterfactual salience is serialization applied
      to possibility space rather than to sensory processing.

  - receptor_id: conflation
    name: Category Collapse Detection
    family: epistemic
    tier: branch

    dependencies:
      - receptor_id: doubt_detection
        note: "Must detect commitment-performance mismatch before detecting category failure"
      - receptor_id: exception_detection
        note: "Must accumulate exceptions before detecting that a single concept is actually two"

    environmental_trigger:
      structure: |
        The organism detects that two things it has been treating as the
        same concept are actually distinct — and that this conflation has
        been producing prediction errors. Not just that the concept has
        exceptions (exception_detection covers that), but that the
        exceptions have structure: they cluster into a second category
        that the organism has been systematically ignoring.

        The firing condition: a concept C with high certainty but high
        variance (m2), where the prediction errors are bimodal — some
        predictions succeed and some fail, and the failures share a
        common context that the successes don't.
      survival_benefit: |
        Conflation detection enables category refinement. An organism
        that treats "predators" as one concept pays the cost when
        the avoidance strategy for type-A predators fails against
        type-B. Detecting the conflation — "these are not one thing" —
        is the first step toward the split that resolves the prediction
        errors.
      metabolic_cost: medium
      selection_pressure: |
        Environments where two genuinely different things share
        surface features, and where the difference is consequential.
        The selection pressure is the accumulated cost of wrong
        predictions from the conflated concept.

    selection_environments:
      - environments_with_similar_looking_different_things
      - environments_where_category_errors_are_costly
      - non_stationary_environments

    unlocks:
      - category_refinement
      - fundamental_distinction
      - concept_splitting

    emergence_signature:
      description: |
        The organism splits a previously unified concept into two after
        a period of increasing prediction errors. Behavioral marker:
        actions that were previously the same for both underlying types
        become differentiated — the organism starts responding differently
        to the two things it used to treat as one.
      metrics:
        - metric_name: concept_split_rate
          measurement_method: |
            Track mental model entries with high certainty + high m2
            (bimodal variance). After a split event (new entries created
            for the sub-categories), measure whether prediction error
            decreases. Conflation detection = split events followed by
            error reduction.
          expected_range: ">30% error reduction after split"
          detection_threshold: 0.3
        - metric_name: thinking_path_divergence
          measurement_method: |
            In the MCTS thinking tree, conflated concepts produce high
            path_divergence — the same starting concept leads to
            different simulated outcomes. Measure correlation between
            path_divergence and subsequent concept splitting.
          expected_range: ">0.3 correlation"
          detection_threshold: 0.3

    predicted_emergence_order:
      generation_range: "150-250"
      confidence: medium

    notes: |
      Conflation connects directly to the thinking substrate. The MCTS
      tree's path_divergence channel IS the signal for conflation: when
      a single concept produces wildly different simulated outcomes,
      that divergence means the concept is covering two different
      underlying states. The organism detects conflation by sensing
      divergence in its own thinking paths.

      The genome itself is subject to conflation. Receptor categories
      defined in this file may contain conflations that only become
      visible when richer environments produce prediction errors that
      reveal the hidden distinction. This receptor is the mechanism
      by which the genome revises itself from within.

  - receptor_id: fundamental_distinction
    name: Load-Bearing Difference Detection
    family: epistemic
    tier: canopy

    dependencies:
      - receptor_id: conflation
        note: "Must detect that things are conflated before finding where the real boundary is"
      - receptor_id: rule_extraction
        note: "Must extract rules to determine which level of description matters"
      - receptor_id: hierarchical_abstraction
        note: "Must represent levels of description"

    environmental_trigger:
      structure: |
        The organism detects that two things which appear similar at
        the surface have a difference at a deeper level that is
        load-bearing for everything downstream. Not just "these are
        different" (the similarity family handles that) but "this
        is THE difference — the level at which everything else
        follows." The level at which the distinction is fundamental
        determines what can be correctly inferred from it.

        The firing condition: after a conflation is detected and the
        organism is searching for the boundary, the fundamental
        distinction fires when it finds the level of description
        at which the two previously-conflated things become
        consistently predictable — where the MCTS value divergence
        disappears because the concepts have been correctly separated.
      survival_benefit: |
        Fundamental distinction is what makes category refinement
        correct rather than arbitrary. An organism could split a
        conflated concept along any feature — color, size, location.
        Fundamental distinction detects which feature is the one
        that makes the downstream predictions work. The benefit is
        not just having two categories instead of one, but having
        the RIGHT two categories — the ones that carve nature at
        its joints.
      metabolic_cost: high
      selection_pressure: |
        Environments where surface features mislead and the
        load-bearing feature is not the most salient. The organism
        must learn to look past the obvious difference to the one
        that actually predicts outcomes.

    selection_environments:
      - environments_with_deep_structure
      - environments_where_surface_similarity_misleads
      - environments_requiring_correct_abstraction_level

    unlocks:
      - correct_category_formation
      - epistemic_strategy_refinement
      - theory_formation_support

    emergence_signature:
      description: |
        After a conflation is detected, the organism tries multiple
        splits and converges on the one that maximally reduces
        prediction error. Behavioral marker: the organism explores
        several potential distinction levels, and the one it settles
        on produces value convergence in the MCTS tree — the
        divergence that triggered conflation detection disappears.
      metrics:
        - metric_name: split_quality
          measurement_method: |
            After a concept split, compare prediction error reduction
            across different potential split features. Fundamental
            distinction = the organism converges on the split that
            produces the largest error reduction, not just any split.
          expected_range: ">0.5 of maximum possible error reduction"
          detection_threshold: 0.5
        - metric_name: thinking_convergence_after_split
          measurement_method: |
            After the concept is split on the fundamental dimension,
            measure MCTS value_convergence for each sub-concept.
            Fundamental distinction = value_convergence increases
            (the subtrees stabilize because predictions are now correct).
          expected_range: ">0.3 convergence increase"
          detection_threshold: 0.3

    predicted_emergence_order:
      generation_range: "200-350"
      confidence: low

    notes: |
      Fundamental distinction is the receptor-level mechanism for
      what philosophy calls "carving nature at its joints." The
      organism doesn't need the concept of a natural kind — it needs
      a receptor that fires when a distinction makes all the
      downstream predictions work. The philosophical concept falls
      out as a description of what the receptor detects.

      The asymmetry between conflation and fundamental distinction
      matters: conflation fires first (something is wrong with this
      category), then the organism searches, then fundamental
      distinction fires when it finds the right boundary. Conflation
      is the error signal. Fundamental distinction is the resolution
      signal. Together they form a cycle that refines the organism's
      conceptual apparatus — and because MCTS mediates both (divergence
      triggers conflation, convergence confirms distinction), the
      thinking substrate is the mechanism through which concepts
      improve.

  - receptor_id: topology_awareness
    name: Cognitive Repertoire State Detection
    family: epistemic
    tier: canopy

    dependencies:
      - receptor_id: fundamental_distinction
        note: "Must detect load-bearing differences before detecting changes to the difference-set itself"
      - receptor_id: metacognition
        note: "Must model own processing before modeling own cognitive repertoire"
      - receptor_id: capability_change_detection
        note: "Must detect capability change before detecting topology change"

    environmental_trigger:
      structure: |
        The organism detects that its own cognitive repertoire has changed —
        a receptor that used to fire no longer does, a new receptor has
        begun firing, or the pattern of receptor co-activation has shifted.
        This is not about any single thought or prediction. It is about the
        organism detecting what kind of mind it currently has.

        The topology vector — the binary discovery vector recording which
        receptors are active — is the fossil record of selection pressures.
        The topology_awareness receptor fires when that fossil record
        changes: when the organism gains a new sensitivity, loses one, or
        notices that its sensitivities have reorganized.

        The firing condition: the organism maintains a running estimate of
        its own receptor activation pattern (which thinking channels fire,
        which mental model features are active, which prediction types
        succeed). When that pattern changes significantly — measured as
        drift in the activation distribution — the receptor fires.
      survival_benefit: |
        An organism that detects its own cognitive expansion can seek
        environments that develop missing capabilities. An organism that
        detects cognitive contraction can protect degrading capabilities.
        An organism that detects reorganization can recalibrate its
        strategies to match its new cognitive profile.

        Without topology_awareness, the organism gets smarter but doesn't
        know it's getting smarter. The self-modifying loop (T83) operates
        but the organism can't direct it. With topology_awareness, the
        organism can steer its own cognitive development — choosing
        environments, experiences, and thinking strategies based on
        what kind of mind it currently has and what kind it needs.

        This is the mechanism by which the ceiling (T83) actively rises
        rather than passively drifting: the organism notices its own
        growth and acts to continue it.
      metabolic_cost: high
      selection_pressure: |
        Environments where cognitive capabilities change over the
        organism's lifetime and where detecting those changes enables
        better environment selection. The selection pressure is
        strongest in developmental environments where the organism
        passes through qualitatively different cognitive stages
        and where the optimal strategy depends on which stage
        it's in.

    selection_environments:
      - developmental_environments
      - environments_requiring_adaptive_strategy
      - environments_where_cognitive_profile_matters

    unlocks:
      - directed_cognitive_development
      - environment_selection_for_growth
      - cognitive_identity

    emergence_signature:
      description: |
        The organism's behavior changes when its cognitive repertoire
        changes — not just because new capabilities enable new actions,
        but because the organism detects the change itself and adjusts
        its strategy. Behavioral marker: after gaining a new receptor
        (e.g., a new thinking channel starts firing), the organism
        seeks experiences that exercise that receptor, even when those
        experiences don't directly improve reward.

        The strongest signature: the organism's environment-seeking
        behavior correlates with its recent topology changes, not
        just with its current reward gradient. An organism that just
        gained spatial reasoning seeks spatial challenges. An organism
        that lost prediction accuracy seeks stable environments for
        recalibration.
      metrics:
        - metric_name: topology_change_behavioral_response
          measurement_method: |
            Track the activation pattern of internal observation channels
            (mm features, thinking channels, pattern features) over a
            sliding window. When the pattern shifts significantly
            (cosine distance > 0.2 between windows), measure whether
            the organism's subsequent actions change more than expected
            from the environmental change alone. Topology awareness =
            behavioral adjustment driven by internal repertoire change,
            controlling for external state change.
          expected_range: ">0.15 partial correlation"
          detection_threshold: 0.15
        - metric_name: growth_seeking
          measurement_method: |
            After a period of topology expansion (new channels activating),
            measure whether the organism preferentially enters environments
            or states that exercise the new channels. Growth seeking =
            new-channel activation rate in chosen environments exceeds
            rate in random environments.
          expected_range: ">1.5x activation rate"
          detection_threshold: 1.5

    predicted_emergence_order:
      generation_range: "300-500"
      confidence: low

    notes: |
      Topology awareness is the receptor that makes the self-modifying
      loop conscious. Without it, T83's loop runs but the organism is
      a passenger. With it, the organism is the driver — it detects
      its own cognitive state, evaluates it against its needs, and
      steers toward the cognitive profile that fits its environment.

      The implementation path: the organism already has internal
      observation channels (mm_certainty, learning_progress,
      controllability, thinking channels 0-5, pattern features).
      The topology_awareness receptor operates on the *distribution*
      of these channels — not their values at a single timestep,
      but the pattern of which ones are active and how that pattern
      has changed. This is a second-order receptor: it reads the
      output of other receptors, not the world.

      Connection to the genome: if the topology vector is the fossil
      record, topology_awareness is the organism reading its own
      fossil record in real time. It can detect: "I used to have
      strong doubt detection but it's fading" or "my thinking
      substrate just started producing value_convergence signals
      it didn't before." Each detection is actionable — seek
      experiences that restore the fading capability, or exercise
      the new one.

      Connection to MCTS: the thinking substrate's 6 channels are
      themselves part of the topology. When the organism starts
      using depth_reached (currently inactive at iteration 3),
      topology_awareness fires on that change. The organism notices
      it has started thinking deeper and can decide whether to
      continue developing that capacity or redirect.

      The deepest implication: an organism with topology_awareness
      has a concept of cognitive identity — "what kind of mind am I"
      as a detectable, motivationally significant state. This is
      not self-awareness in the philosophical sense but in the
      functional sense: the organism's cognitive profile is an
      object it can reason about, plan around, and act to change.

  - receptor_id: epistemic_strategy
    name: Deliberate Epistemic State Management
    family: epistemic
    tier: canopy

    dependencies:
      - receptor_id: counterfactual_salience
        note: "Must detect salient possibilities before managing them"
      - receptor_id: fundamental_distinction
        note: "Must find load-bearing differences before managing epistemic states strategically"
      - receptor_id: topology_awareness
        note: "Must detect own cognitive repertoire before managing it strategically"
      - receptor_id: self_regulation
        note: "Must regulate own processing states"
      - receptor_id: pipeline_optimization
        note: "Must optimize own processing architecture"

    environmental_trigger:
      structure: |
        The organism deliberately manages its own epistemic state —
        choosing when to believe, when to doubt, and when to hold
        open counterfactuals. Not just detecting these states (the
        earlier receptors) but actively modulating them based on
        predicted consequences.

        This is the organism as its own epistemic engineer: "I should
        doubt this more," "I should commit to this now," "I should
        hold this possibility open longer." The management is
        deliberate, not reactive.
      survival_benefit: |
        Epistemic strategy enables the organism to allocate its
        cognitive resources optimally across the belief/doubt/
        counterfactual space. An organism that can choose when to
        commit and when to explore navigates the explore/exploit
        tradeoff at the epistemic level, not just the behavioral one.
      metabolic_cost: very_high
      selection_pressure: |
        Environments where the optimal epistemic strategy varies —
        sometimes fast commitment is adaptive, sometimes sustained
        doubt, sometimes holding open many counterfactuals. The
        organism must detect which strategy fits the current
        environment and switch accordingly.

    selection_environments:
      - variable_strategy_environments
      - environments_requiring_epistemic_flexibility

    unlocks:
      - deliberate_belief_management
      - epistemic_flexibility
      - scientific_reasoning

    emergence_signature:
      description: |
        The organism's epistemic strategy varies with environmental
        context — committing quickly in stable environments, holding
        open counterfactuals in novel ones, and switching between
        strategies based on detected environmental features.
      metrics:
        - metric_name: strategy_environment_correlation
          measurement_method: |
            Measure time-to-commitment as a function of environmental
            predictability. Organisms with epistemic strategy should
            commit faster in stable environments and slower in
            volatile ones — and the switch should precede evidence
            of which strategy is correct.
          expected_range: ">0.4 correlation"
          detection_threshold: 0.4

    predicted_emergence_order:
      generation_range: "350-500+"
      confidence: very_low

    notes: |
      This is where T50 (science is not a cultural invention) gets
      its receptor-level mechanism. Scientific reasoning is epistemic
      strategy applied systematically: doubt what generates prediction
      errors, hold open counterfactuals that predict well, commit
      when the evidence structure warrants it. The epistemic strategy
      receptor is the individual-level prerequisite for what becomes
      scientific method at the cultural level.
