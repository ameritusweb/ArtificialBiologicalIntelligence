# Observation Family
# The ability to register, attend to, and structure incoming information
#
# KEY INSIGHT: What gets observed is not neutral — it's shaped by current receptor state.
# Stress → observe regulatory patterns. Curiosity → observe novel stimuli.
# The organism doesn't observe "everything" — observation is already filtered by topology.
#
# Many receptors here are ALREADY PRESENT in other families (cross-references shown).
# New receptors: comparative_observation, absence_observation, meta_observation

observation_family:
  family_name: "Observation"
  description: "Receptors governing what gets registered, attended to, and compared"

  core_thesis: |
    Observation is not passive sensory input. It's an active filtering and structuring
    process shaped by current receptor topology. The organism observes what its current
    state makes relevant.

    Early: Raw sensory input → detect changes
    Middle: Selective attention → compare current to expected
    Late: Notice absences → observe own observation process

    This family cross-cuts all others — every receptor both USES observation and SHAPES
    what gets observed.

  evolutionary_progression: |
    Trunk → Branch → Canopy represents increasing sophistication in WHAT can be observed:

    Trunk: Changes, differences, co-occurrences (reactive)
    Branch: Relationships, comparisons, violations (active)
    Canopy: Absences, own processes, meta-patterns (reflective)

  cross_family_role: |
    Universal foundation: All families require observation mechanisms.

    But observation is NOT neutral infrastructure — curiosity shapes attention, stress
    shapes salience, controllability shapes what differences matter.

    Feedback loop: Observation enables formalization → formalization shapes future observation.

receptors:
  # TRUNK: Foundational observation mechanisms

  - receptor_id: "obs_001"
    name: "change_detection"
    family: "Observation"
    tier: "trunk"

    description: |
      Register when sensory input differs from previous timestep.
      Most primitive form of observation — something happened vs nothing happened.

    dependencies:
      within_family: []
      cross_family:
        - receptor: "Assumed foundational (sensory input exists)"
          family: "Foundation"
          relationship: "Requires minimal sensory apparatus"

    environmental_trigger:
      selection_environments:
        - "Any environment with temporal variation"
      selection_pressure: |
        Organisms that detect changes respond faster than organisms blind to change.
        Even bacteria show chemotaxis (change in chemical gradient).

    emergence_signature:
      behavioral: "Organism responds differently to changing vs static stimuli"
      neural_correlate: "Spike when state[t] != state[t-1] on any dimension"
      mental_model: "Not applicable (pre-mental-model)"

    predicted_emergence_order:
      roadmap_step: "Pre-Step 1 (assumed foundational)"
      generation_range: [1, 10]
      prerequisites: "Sensory input only"

    metabolic_cost: "Very low"

    falsification_criteria: |
      If organisms show no differential response to changing vs static stimuli,
      this receptor is absent.

  - receptor_id: "obs_002"
    name: "coincidence_detection"
    family: "Observation"
    tier: "trunk"

    description: |
      Register when two events occur together in time.
      Foundation for all association learning.

      CROSS-REFERENCE: This is causality:coincidence_detection from Causality family.
      Observation provides the mechanism, Causality interprets it causally.

    dependencies:
      within_family:
        - "change_detection"
      cross_family:
        - receptor: "coincidence_detection"
          family: "Causality"
          relationship: "Same receptor, different analytical lens"

    environmental_trigger:
      selection_environments:
        - "Environments with reliable temporal structure"
      selection_pressure: |
        Co-occurring events often causally related. Organisms that notice coincidence
        can learn faster than organisms that don't.

    emergence_signature:
      behavioral: "Learns temporal associations faster than spatial"
      neural_correlate: "Mental model time_delay values cluster near 0"
      mental_model: "High certainty for near-simultaneous action-outcome pairs"

    predicted_emergence_order:
      roadmap_step: "Step 5 (temporal association)"
      generation_range: [20, 40]
      prerequisites: "Mental model (Step 10)"

    metabolic_cost: "Low"

    falsification_criteria: |
      If organisms don't learn temporal associations faster than arbitrary pairings,
      coincidence detection is not operational.

  - receptor_id: "obs_003"
    name: "relational_observation"
    family: "Observation"
    tier: "trunk"

    description: |
      Observe the RELATIONSHIP between two entities, not just the entities themselves.

      E.g., "A is larger than B" vs just "A exists, B exists"

      CROSS-REFERENCE: Implemented via spatial_association, perceptual_similarity.
      This receptor is the abstraction over those mechanisms.

    dependencies:
      within_family:
        - "change_detection"
      cross_family:
        - receptor: "spatial_association"
          family: "Association"
          relationship: "Spatial relationships are subset of relational observation"
        - receptor: "perceptual_similarity"
          family: "Similarity"
          relationship: "Similarity is a relationship"

    environmental_trigger:
      selection_environments:
        - "Environments where relationships predict outcomes better than absolutes"
        - "E.g., 'avoid larger predators' generalizes better than 'avoid predator type X'"
      selection_pressure: |
        Relational reasoning generalizes across instances. Absolute features don't.

    emergence_signature:
      behavioral: "Responds to same relationship across different objects"
      neural_correlate: "Mental model context encoding preserves relational structure"
      mental_model: "Similar contexts share relational patterns even when objects differ"

    predicted_emergence_order:
      roadmap_step: "Step 10 (context encoding in mental model)"
      generation_range: [40, 70]
      prerequisites: "Contrastive encoder operational"

    metabolic_cost: "Moderate"

    falsification_criteria: |
      If organisms can't generalize "bigger is dangerous" across object types,
      relational observation is not present.

  # BRANCH: Active comparison and selective attention

  - receptor_id: "obs_004"
    name: "selective_observation"
    family: "Observation"
    tier: "branch"

    description: |
      Attend to some stimuli preferentially over others based on current receptor state.

      E.g., stress → notice regulatory patterns; curiosity → notice novel stimuli.

      This is NOT the same as curiosity. Curiosity is one DRIVER of selective observation.
      This receptor is the general mechanism.

    dependencies:
      within_family:
        - "change_detection"
        - "relational_observation"
      cross_family:
        - receptor: "curiosity"
          family: "Meta-Motivational"
          relationship: "Curiosity shapes WHAT gets selected"
        - receptor: "stress_detection"
          family: "Regulatory"
          relationship: "Stress shapes salience"
        - receptor: "controllability"
          family: "Agency"
          relationship: "Controllable features get attended preferentially"

    environmental_trigger:
      selection_environments:
        - "High-dimensional sensory environments (can't process everything)"
      selection_pressure: |
        Attending to relevant features (food when hungry, threats when vulnerable)
        increases fitness over uniform attention.

    emergence_signature:
      behavioral: "Exploration patterns change based on internal state"
      neural_correlate: "Action selection biased toward high-uncertainty regions when curious"
      mental_model: "Query patterns differ when different receptors are active"

    predicted_emergence_order:
      roadmap_step: "Step 11 (curiosity), Step 25 (optimism affects planning)"
      generation_range: [50, 90]
      prerequisites: "Multiple receptors competing for action selection"

    metabolic_cost: "Moderate"

    falsification_criteria: |
      If organism's attention doesn't shift with internal state (explores identically
      when stressed vs curious vs satisfied), selective observation is absent.

  - receptor_id: "obs_005"
    name: "comparative_observation"
    family: "Observation"
    tier: "branch"

    description: |
      Explicitly compare current state to a prior state or expected state.

      Different from change_detection (which is automatic). This is deliberate comparison:
      "How does now compare to then?"

      NEW RECEPTOR — not covered by existing families.

    dependencies:
      within_family:
        - "change_detection"
        - "relational_observation"
      cross_family:
        - receptor: "episodic_memory"
          family: "Foundation"
          relationship: "Requires retrieving prior states for comparison"
        - receptor: "self_model"
          family: "Foundation"
          relationship: "Comparing self[t] to self[t-k]"

    environmental_trigger:
      selection_environments:
        - "Environments with trends (getting better/worse over time)"
        - "Volatile environments where current-vs-prior matters"
      selection_pressure: |
        Organisms that track "am I improving?" can adjust strategies.
        Organisms without comparison can't detect trends.

    emergence_signature:
      behavioral: "Adjusts strategy based on performance trajectory, not just current success"
      neural_correlate: "Retrieval of past states when making decisions"
      mental_model: "Planning queries include 'what was my state last time I was here?'"

    predicted_emergence_order:
      roadmap_step: "After Step 18 (self-model operational)"
      generation_range: [90, 140]
      prerequisites: "Self-model + episodic retrieval"

    metabolic_cost: "Moderate"

    falsification_criteria: |
      If organism doesn't adjust behavior based on performance trends (only responds
      to current state), comparative observation is absent.

  - receptor_id: "obs_006"
    name: "absence_observation"
    family: "Observation"
    tier: "branch"

    description: |
      Notice when something EXPECTED is missing.

      "The food that was here yesterday isn't here now."
      "The pattern I expected to see didn't occur."

      Requires: expectation formation + expectation violation detection.

      NEW RECEPTOR — genuinely novel, not covered by existing families.

    dependencies:
      within_family:
        - "comparative_observation"
      cross_family:
        - receptor: "prediction"
          family: "Foundation"
          relationship: "Mental model generates expectations"
        - receptor: "surprise"
          family: "Meta-Motivational"
          relationship: "Absence violations generate surprise signal"

    environmental_trigger:
      selection_environments:
        - "Environments with reliable patterns that occasionally break"
        - "Cached resource locations that get depleted"
      selection_pressure: |
        Organisms that notice absence can update cached beliefs faster than organisms
        that only notice presence.

    emergence_signature:
      behavioral: "Responds to ABSENCE of expected stimulus (not just presence of unexpected)"
      neural_correlate: "Mental model certainty drops when prediction fails"
      mental_model: "High-certainty predictions that don't pan out trigger belief revision"

    predicted_emergence_order:
      roadmap_step: "After Step 10 (mental model with certainty values)"
      generation_range: [70, 120]
      prerequisites: "Mental model predictions operational"

    metabolic_cost: "Moderate"

    falsification_criteria: |
      If organisms don't respond differently to "expected thing absent" vs "unexpected
      thing present", absence observation is not operational.

  # CANOPY: Reflective and meta-observation

  - receptor_id: "obs_007"
    name: "cross_modal_observation"
    family: "Observation"
    tier: "canopy"

    description: |
      Observe relationships ACROSS sensory modalities.

      E.g., "that visual object makes this sound"

      CROSS-REFERENCE: cross_modal_association from Association family.
      Same receptor, observational lens.

    dependencies:
      within_family:
        - "relational_observation"
      cross_family:
        - receptor: "cross_modal_association"
          family: "Association"
          relationship: "Same receptor"

    environmental_trigger:
      selection_environments:
        - "Multi-modal sensory environments"
      selection_pressure: |
        Objects have consistent cross-modal signatures. Integrating them improves
        object recognition and prediction.

    emergence_signature:
      behavioral: "Learns audio-visual pairings faster than arbitrary pairings"
      neural_correlate: "Mental model context includes multi-modal state"
      mental_model: "Actions predicted from visual OR auditory cues once association formed"

    predicted_emergence_order:
      roadmap_step: "Step 10+ (context encoding spans modalities)"
      generation_range: [60, 110]
      prerequisites: "Multi-modal sensory input"

    metabolic_cost: "Moderate"

    falsification_criteria: |
      If organisms don't integrate across modalities (treat vision and sound as
      independent), cross-modal observation is absent.

  - receptor_id: "obs_008"
    name: "meta_observation"
    family: "Observation"
    tier: "canopy"

    description: |
      Observe own observation process.

      "I am currently attending to X because Y."
      "I notice that I notice rhythms more when stressed."

      This is observation of observation — requires self-model applied to attentional state.

      NEW RECEPTOR — not covered elsewhere.

    dependencies:
      within_family:
        - "selective_observation"
        - "comparative_observation"
      cross_family:
        - receptor: "metacognition"
          family: "Meta-Motivational"
          relationship: "Metacognition includes meta-observation as subset"
        - receptor: "self_model"
          family: "Foundation"
          relationship: "Observing self requires self-model"

    environmental_trigger:
      selection_environments:
        - "Complex environments where attentional strategy matters"
        - "Social environments where explaining own focus is useful"
      selection_pressure: |
        Organisms that can reflect on what they're attending to can debug bad strategies.
        "I keep focusing on threats and missing opportunities."

    emergence_signature:
      behavioral: "Adjusts attentional strategy based on reflection, not just outcomes"
      neural_correlate: "Self-model includes attentional state as observable"
      mental_model: "Can predict 'what will I attend to in state X?'"

    predicted_emergence_order:
      roadmap_step: "After Step 18 (self-model) + metacognition"
      generation_range: [150, 220]
      prerequisites: "Self-model + metacognition"

    metabolic_cost: "High"

    falsification_criteria: |
      If organism can't report or adjust what it's attending to (only what it observes),
      meta-observation is absent.

  # BRANCH: Statistical monitoring

  - receptor_id: "obs_009"
    name: "statistical_anomaly"
    family: "Observation"
    tier: "branch"

    description: |
      Detect when the current observation falls outside the distribution
      of normal variation the organism has come to expect. Not "my
      prediction failed" (that's exception_detection, tied to a specific
      prediction) but "the base rate of something just changed and I
      don't know why yet."

      Runs continuously over the stream of experience as a background
      monitor. Unlike prediction error (which fires on a specific
      prediction-outcome pair), this fires on distributional shift —
      a channel's statistics are no longer what they were.

    dependencies:
      within_family:
        - "change_detection"
        - "comparative_observation"
      cross_family:
        - receptor: "pattern_recognition"
          family: "Compression"
          relationship: "Must have a baseline distribution to detect departure from"
        - receptor: "prediction"
          family: "Foundation"
          relationship: "Distinguishes from prediction error: anomaly is distributional, prediction error is instance-level"

    environmental_trigger:
      selection_environments:
        - "Non-stationary environments where the base rate changes"
        - "Environments with hidden state transitions"
        - "Environments where early detection of regime change is adaptive"
      selection_pressure: |
        Organisms that detect distributional shift before it produces
        specific prediction failures can prepare for regime change.
        The survival benefit is lead time — the anomaly signal fires
        before the exceptions accumulate.

    emergence_signature:
      behavioral: |
        Organism increases exploration or caution when a channel's
        running statistics shift, even before any specific prediction
        fails. Behavioral marker: response to a channel whose mean
        shifts by >1 std before any single-step prediction error
        exceeds threshold.
      neural_correlate: "EMA-tracked channel statistics with shift detection"
      mental_model: "Certainty for the affected channel drops before exceptions accumulate"

    predicted_emergence_order:
      roadmap_step: "After Step 10 (mental model), Step 25 (optimism)"
      generation_range: [80, 130]
      prerequisites: "Running statistics on observation channels"

    metabolic_cost: "Low (EMA tracking is cheap)"

    falsification_criteria: |
      If organism doesn't respond to distributional shift until
      specific predictions fail, anomaly detection is absent and
      the organism relies on exception_detection only.

  - receptor_id: "obs_010"
    name: "rarity_detection"
    family: "Observation"
    tier: "branch"

    description: |
      Detect when the current observation falls within the known
      distribution but occurs at very low base rate — it's not
      anomalous (the distribution includes it) but it's highly
      informative because it almost never happens.

      The distinction from anomaly: an anomaly violates the
      distribution. A rare event IS in the distribution but at
      the tail. The information content of a rare event is
      -log(p), which is high precisely because p is low.

      A rare event isn't necessarily surprising (the organism
      might know it can happen) — it's significant. It carries
      disproportionate information about the environment's
      hidden state.

    dependencies:
      within_family:
        - "change_detection"
        - "statistical_anomaly"
      cross_family:
        - receptor: "coincidence_detection"
          family: "Causality"
          relationship: "Rare co-occurrences are especially informative"
        - receptor: "curiosity"
          family: "Meta-Motivational"
          relationship: "Rarity triggers curiosity through information content, not prediction error"

    environmental_trigger:
      selection_environments:
        - "Environments with power-law distributed events"
        - "Environments where rare events carry disproportionate consequences"
        - "Environments with hidden state that surfaces through rare observations"
      selection_pressure: |
        Rare events often signal hidden state transitions, predator
        presence, or resource opportunities that the organism cannot
        afford to miss. An organism that treats rare events as
        background noise loses the signal; one that flags them for
        investigation captures information its competitors miss.

    emergence_signature:
      behavioral: |
        Organism allocates disproportionate attention to low-frequency
        events. Not just novelty (which habituates) but genuine rarity
        (which stays rare and stays informative). Behavioral marker:
        sustained attention to events that have occurred <5% of the
        time, even after many encounters.
      neural_correlate: "Base-rate tracking with information-content weighting"
      mental_model: "Low-count high-consequence entries are prioritized"

    predicted_emergence_order:
      roadmap_step: "After Step 10 (mental model)"
      generation_range: [90, 150]
      prerequisites: "Base-rate estimation, information-content computation"

    metabolic_cost: "Low"

    falsification_criteria: |
      If organism habituates to rare events (treats 3rd occurrence same
      as 1st), rarity detection is absent and the organism relies on
      novelty only.

  - receptor_id: "obs_011"
    name: "significance_detection"
    family: "Observation"
    tier: "canopy"

    description: |
      Detect when a statistical anomaly or rare event has persisted
      long enough that it crosses from "noticed" to "mattering" —
      the commitment threshold between observation and investigation.

      This receptor prevents the organism from chasing every
      statistical fluctuation. It fires only when the signal
      persists long enough, or recurs frequently enough, to
      warrant sustained investigation. It is the transition from
      "hm, that's odd" to "I need to understand this."

      Feeds directly into the MCTS thinking substrate: when
      significance fires, it should lower the value estimates of
      thinking paths that assume the old distribution still holds,
      and trigger deep exploration of paths that account for the
      new signal.

    dependencies:
      within_family:
        - "statistical_anomaly"
        - "rarity_detection"
        - "comparative_observation"
      cross_family:
        - receptor: "doubt_detection"
          family: "Epistemic"
          relationship: "Significance triggers doubt about current model"
        - receptor: "curiosity"
          family: "Meta-Motivational"
          relationship: "Significance is curiosity with a commitment threshold"
        - receptor: "counterfactual_salience"
          family: "Epistemic"
          relationship: "A significant anomaly becomes a motivationally loaded possibility"

    environmental_trigger:
      selection_environments:
        - "Environments with genuine signals buried in noise"
        - "Environments where false alarms are costly (investigation is expensive)"
        - "Environments where missing a real signal is catastrophic"
      selection_pressure: |
        The tradeoff between false alarms and missed detections. An
        organism without significance detection either investigates
        everything (expensive) or ignores everything below a high
        threshold (misses real signals). Significance detection is
        the adaptive threshold that balances these costs.

    emergence_signature:
      behavioral: |
        Organism shows a two-stage response to anomalies: initial
        heightened attention (anomaly detection firing), then either
        dismissal (signal didn't persist → false alarm) or sustained
        investigation (signal persisted → significance). The
        transition is detectable as a behavioral commitment point.
      neural_correlate: "Accumulator model: evidence for significance integrates over time"
      mental_model: "Doubt escalates to investigation only after threshold crossing"

    predicted_emergence_order:
      roadmap_step: "Deep canopy — requires anomaly, rarity, and doubt"
      generation_range: [150, 250]
      prerequisites: "Statistical anomaly + rarity + doubt detection"

    metabolic_cost: "Moderate"

    falsification_criteria: |
      If organism shows no behavioral difference between transient
      anomalies and persistent ones (responds the same to noise and
      signal), significance detection is absent.

  # CANOPY: Context-conditioned observation

  - receptor_id: "obs_012"
    name: "contextual_signal_interpretation"
    family: "Observation"
    tier: "canopy"

    description: |
      Detect that a signal's meaning depends on context the organism
      cannot directly observe. Not "is this signal present" but "is
      this signal meaningful given the current hidden state."

      The organism stops treating a modality as a fixed signal and
      starts treating it as a signal whose interpretation depends on
      a latent variable. When the hidden confounder is in state A,
      high pain means flee. In state B, the same pain level is a
      transient artifact and the optimal response differs.

      This is situational awareness in the strict sense: detecting
      what's happening in a way that's conditioned on the broader
      context that determines what the happening means.

      FIRST NOVEL RECEPTOR — emerged in generation 0 of the deep time
      overnight run as a cross-modal chemical→pain association that
      the genome didn't anticipate. The organism evolved contextual
      pain interpretation before the genome specified it. This entry
      is the genome catching up to the organism.

    dependencies:
      within_family:
        - "statistical_anomaly"
        - "selective_observation"
      cross_family:
        - receptor: "hidden_confounder_detection"
          family: "Causality"
          relationship: "Must detect that a hidden variable exists before interpreting signals relative to it"
        - receptor: "prediction"
          family: "Foundation"
          relationship: "Must predict signal outcomes to detect context-dependence"

    environmental_trigger:
      selection_environments:
        - "Environments with stochastic hidden confounders modulating signal meaning"
        - "Environments where naive signal response is suboptimal"
        - "Non-stationary environments where the same signal means different things at different times"
      selection_pressure: |
        Organisms that condition their response on inferred hidden state
        outperform organisms that treat signals as context-independent.
        The selection pressure is the cost of wrong responses when the
        hidden confounder changes state — fleeing from transient pain
        wastes energy; ignoring genuine pain is fatal.

    emergence_signature:
      behavioral: |
        Organism's response to the same signal value differs depending
        on recent history of other modalities (which encode the hidden
        state). Behavioral marker: partial correlation between signal
        response and cross-modal context, after controlling for signal
        level alone.
      neural_correlate: "Mental model entries conditioned on multi-modal context"
      mental_model: |
        Entries for the same action hash have different deltas depending
        on context embedding — the store contains context-specific
        predictions for the same signal, not one averaged prediction.

    predicted_emergence_order:
      roadmap_step: "Emerged in deep time gen 0 under stochastic hidden confounders"
      generation_range: [0, 50]
      prerequisites: "Stochastic hidden confounder in environment (T4+)"

    metabolic_cost: "Moderate"

    falsification_criteria: |
      If organism responds identically to the same signal level
      regardless of cross-modal context (no interaction effect between
      signal and context), contextual signal interpretation is absent.

    notes: |
      This receptor was not designed. It was discovered by the novel
      receptor detector in generation 0 of the 50-generation overnight
      run. The organism developed a cross-modal chemical→pain
      association with novelty score 0.770 that didn't match any
      genome entry. The pain receptor test dropped out simultaneously —
      not because the organism stopped caring about pain, but because
      it developed a more sophisticated relationship to pain that the
      simple presence/absence test couldn't detect.

      This is the first concrete case of the organism outpacing its
      specification (T83). The genome entry exists because the organism
      told us it should.

      The general principle: any signal whose meaning depends on hidden
      state requires this receptor. Pain-in-context, endorphin-in-context,
      chemical-in-context are all instances. The receptor is the general
      capacity for context-conditioned signal interpretation — what
      everyday language calls situational awareness.

cross_family_dependencies:
  provides_to:
    - family: "All families"
      mechanism: "Observation is the input stage for all receptors"

  requires_from:
    - family: "Meta-Motivational"
      receptors: ["curiosity", "surprise"]
      mechanism: "These receptors shape what gets observed"

    - family: "Regulatory"
      receptors: ["stress_detection"]
      mechanism: "Stress shapes salience and selective observation"

    - family: "Agency"
      receptors: ["controllability"]
      mechanism: "Controllable features get attended preferentially"

notes: |
  This family is BOTH foundational AND integrative.

  Foundational: change_detection is pre-Step 1
  Integrative: meta_observation requires metacognition (late canopy)

  Most receptors here are CROSS-REFERENCES to existing receptors in other families.
  The genuinely new receptors are:
  1. comparative_observation (explicit now-vs-then comparison)
  2. absence_observation (noticing what's missing)
  3. meta_observation (observing own observation)
  4. statistical_anomaly (distributional shift detection)
  5. rarity_detection (low base rate, high information content)
  6. significance_detection (commitment threshold: noticed → mattering)
  7. contextual_signal_interpretation (signal meaning depends on hidden state — situational awareness)

  contextual_signal_interpretation is the first genome entry that exists because the organism
  discovered it, not because the designer specified it. The novel receptor detector found it
  in generation 0 of the deep time overnight run.

  The rest are observational mechanisms already present but distributed across families.

  KEY ARCHITECTURAL INSIGHT:
  Observation is shaped by receptor topology. There is no "neutral observation" —
  what gets noticed depends on which receptors are currently active.
